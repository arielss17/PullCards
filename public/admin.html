<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PullCards — Vault of the Game Master</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600&family=MedievalSharp&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">
    <header class="header">
        <div class="header__title">
            <span class="header__title-icon">⚔️</span>
            Vault of the Game Master
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="btnSaveConfig" class="admin-btn admin-btn--primary">SELAR PACTOS</button>
            <a href="/" class="admin-btn"
                style="text-decoration: none; background: rgba(255,255,255,0.05); color: var(--gold);">ESCAPAR</a>
        </div>
    </header>

    <main class="admin-grid-layout">

        <!-- Sidebar: Config de Mesas -->
        <aside class="admin-sidebar">
            <section class="admin-card">
                <h2 class="admin-title">Dimensões (Mesas)</h2>
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.4;">
                    Defina as faixas do D100 para cada reino de invocação.
                </p>
                <div id="tablesConfig" class="tables-grid" style="grid-template-columns: 1fr;">
                    <!-- Injected via JS -->
                </div>
                <button id="btnAddTable" class="admin-btn" style="width: 100%; margin-top: 1rem;">Nova Mesa +</button>
            </section>

            <section class="admin-card">
                <h2 class="admin-title">Gestão de Tiers</h2>
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.4;">
                    Configure raridades (Classificação vs Apelido).
                </p>
                <div id="tiersConfig" class="tables-grid" style="grid-template-columns: 1fr;">
                    <!-- Injected via JS -->
                </div>
                <button id="btnAddTier" class="admin-btn" style="width: 100%; margin-top: 1rem;">Adicionar Tier
                    +</button>
            </section>
        </aside>

        <!-- Content: Bestiário -->
        <section class="admin-content">
            <section class="admin-card">
                <h2 class="admin-title">O Bestiário Eterno</h2>

                <div class="admin-controls">
                    <input type="text" id="monsterSearch" placeholder="Rastrear criatura..." class="admin-input"
                        style="flex: 1; min-width: 200px;">

                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <select id="filterTier" class="admin-input" style="width: auto; font-size: 0.8rem;">
                            <option value="">Todas as Raridades</option>
                            <!-- Injected via JS -->
                        </select>

                        <select id="filterType" class="admin-input" style="width: auto; font-size: 0.8rem;">
                            <option value="">Todos os Tipos</option>
                            <!-- Injected via JS -->
                        </select>

                        <select id="filterTable" class="admin-input" style="width: auto; font-size: 0.8rem;">
                            <option value="">Todas as Mesas</option>
                            <!-- Injected via JS -->
                        </select>

                        <select id="sortConfig" class="admin-input" style="width: auto; font-size: 0.8rem;">
                            <option value="crDes">CR (Maior → Menor)</option>
                            <option value="crAsc">CR (Menor → Maior)</option>
                            <option value="nameAsc">Nome (A-Z)</option>
                            <option value="typeAsc">Tipo (A-Z)</option>
                        </select>
                    </div>
                </div>

                <div id="loadingBestiary"
                    style="text-align: center; padding: 3rem; color: var(--gold-dim); font-family: var(--font-medieval);">
                    Invocando essências...
                </div>

                <div id="monsterListings" class="monster-list-grid" style="display: none;">
                    <!-- Monsters injected via JS -->
                </div>
            </section>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <script src="api.js"></script>
    <script src="logic.js"></script>
    <script src="admin.js"></script>
</body>

</html>
