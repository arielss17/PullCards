<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="PullCards — Entre no ritual. Crie sua conta ou faça login para salvar sua coleção de criaturas.">
    <title>PullCards — Portal do Invocador</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-logo">
            <span class="auth-logo__icon">⚔️</span>
            <h1 class="auth-logo__title">PullCards</h1>
            <p class="auth-logo__subtitle">Portal do Invocador</p>
        </div>

        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" type="button">Entrar</button>
                <button class="auth-tab" id="tabRegister" type="button">Registrar</button>
            </div>

            <!-- Message -->
            <div class="auth-message" id="authMessage"></div>

            <!-- Login Form -->
            <form class="auth-form active" id="formLogin">
                <div class="auth-field">
                    <label class="auth-field__label" for="loginEmail">Email</label>
                    <input class="auth-field__input" id="loginEmail" type="email" placeholder="seu@email.com" required
                        autocomplete="email">
                </div>
                <div class="auth-field">
                    <label class="auth-field__label" for="loginPassword">Senha</label>
                    <input class="auth-field__input" id="loginPassword" type="password" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <button class="auth-submit" type="submit">Iniciar Ritual</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="formRegister">
                <div class="auth-field">
                    <label class="auth-field__label" for="registerName">Nome do Invocador</label>
                    <input class="auth-field__input" id="registerName" type="text" placeholder="Seu nome" required
                        autocomplete="name">
                </div>
                <div class="auth-field">
                    <label class="auth-field__label" for="registerEmail">Email</label>
                    <input class="auth-field__input" id="registerEmail" type="email" placeholder="seu@email.com"
                        required autocomplete="email">
                </div>
                <div class="auth-field">
                    <label class="auth-field__label" for="registerPassword">Senha</label>
                    <input class="auth-field__input" id="registerPassword" type="password" placeholder="••••••••"
                        required autocomplete="new-password">
                </div>
                <button class="auth-submit" type="submit">Forjar Selo</button>
            </form>
        </div>

        <a href="/" class="auth-back">← Jogar sem conta (coleção não será salva)</a>
    </div>

    <script src="auth.js"></script>
</body>

</html>
