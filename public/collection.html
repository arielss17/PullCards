<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="PullCards — Seu bestiário completo. Acompanhe sua coleção de criaturas invocadas.">
    <title>PullCards — Bestiário do Invocador</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="collection.css">
</head>

<body>
    <!-- Header -->
    <header class="col-header">
        <h1 class="col-header__title" data-i18n="collection.pageTitle">📖 Bestiário</h1>
        <nav class="col-header__nav">
            <a href="/" class="col-header__link" data-i18n="collection.play">⚔️ Jogar</a>
            <a href="/admin.html" class="col-header__link" data-i18n="header.admin">⚙️ Admin</a>
            <span class="col-header__link" id="userInfo" style="cursor: default;"></span>
            <div class="header__lang">
                <select id="langSelect" class="lang-select">
                    <option value="pt-BR">🇧🇷 PT-BR</option>
                    <option value="en">🇺🇸 EN</option>
                </select>
            </div>
        </nav>
    </header>

    <!-- Progress -->
    <div class="col-progress">
        <span class="col-progress__text" id="progressText" data-i18n="collection.loading">Carregando...</span>
        <div class="col-progress__bar">
            <div class="col-progress__fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <!-- Filters -->
    <div class="col-filters" id="filterBar">
        <button class="col-filter-btn active" data-filter="all" data-i18n="collection.filterAll">Todas</button>
        <button class="col-filter-btn" data-filter="owned" data-i18n="collection.filterOwned">Possuídas</button>
        <button class="col-filter-btn" data-filter="missing" data-i18n="collection.filterMissing">Faltando</button>
        <!-- Injected via JS -->
    </div>

    <!-- Loading -->
    <div class="col-loading" id="colLoading" data-i18n="collection.loading">Despertando Bestiário...</div>

    <!-- Grid -->
    <div class="col-grid" id="colGrid" style="display: none;"></div>

    <!-- Empty State -->
    <div class="col-empty" id="colEmpty" style="display: none;">
        <span class="col-empty__icon">🔮</span>
        <p class="col-empty__text" data-i18n="collection.emptyLogin">Faça login para ver sua coleção.</p>
    </div>

    <!-- Full Size Card Modal / Overlay -->
    <div class="col-overlay" id="cardOverlay">
        <div class="col-modal">
            <button class="col-modal__close" id="overlayClose">&times;</button>
            <div class="col-modal__card-container" id="modalCardContainer">
                <!-- Javascript will inject the exact .card structure here -->
            </div>
            <div class="col-modal__content">
                <h2 class="col-modal__title" id="modalTitle">Nome do Monstro</h2>
                <div class="col-modal__subtitle" id="modalSubtitle">CR 5 • Elemento</div>

                <div class="col-modal__footer" id="modalFooter">
                    <!-- Javascript will inject "Invocado pela primeira vez em XYZ" -->
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <script src="api.js"></script>
    <script src="logic.js"></script>
    <script src="collection-page.js"></script>
</body>

</html>
