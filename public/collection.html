<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="PullCards — Seu bestiário completo. Acompanhe sua coleção de criaturas invocadas.">
    <title>PullCards — Bestiário do Invocador</title>
    <link rel="stylesheet" href="collection.css">
</head>

<body>
    <!-- Header -->
    <header class="col-header">
        <h1 class="col-header__title">📖 Bestiário</h1>
        <nav class="col-header__nav">
            <a href="/" class="col-header__link">⚔️ Jogar</a>
            <a href="/admin.html" class="col-header__link">⚙️ Admin</a>
            <span class="col-header__link" id="userInfo" style="cursor: default;"></span>
        </nav>
    </header>

    <!-- Progress -->
    <div class="col-progress">
        <span class="col-progress__text" id="progressText">Carregando...</span>
        <div class="col-progress__bar">
            <div class="col-progress__fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <!-- Filters -->
    <div class="col-filters" id="filterBar">
        <button class="col-filter-btn active" data-filter="all">Todas</button>
        <button class="col-filter-btn" data-filter="owned">Possuídas</button>
        <button class="col-filter-btn" data-filter="missing">Faltando</button>
        <!-- Injected via JS -->
    </div>

    <!-- Loading -->
    <div class="col-loading" id="colLoading">Despertando Bestiário...</div>

    <!-- Grid -->
    <div class="col-grid" id="colGrid" style="display: none;"></div>

    <!-- Empty State -->
    <div class="col-empty" id="colEmpty" style="display: none;">
        <span class="col-empty__icon">🔮</span>
        <p class="col-empty__text">Faça login para ver sua coleção.</p>
    </div>

    <script src="auth.js"></script>
    <script src="i18n.js"></script>
    <script src="api.js"></script>
    <script src="logic.js"></script>
    <script src="collection-page.js"></script>
</body>

</html>
