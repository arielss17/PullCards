<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="PullCards - A medieval fantasy RPG card summoning ritual. Roll ancient dice to summon powerful creatures!" />
  <title>PullCards — RPG Card Summoning Ritual</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="i18n.js"></script>
  <script src="api-client.js"></script>
  <script src="auth.js"></script>
</head>

<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-overlay__content">
      <div class="loading-overlay__circle">
        <svg viewBox="0 0 500 500">
          <circle cx="250" cy="250" r="220" stroke="rgba(201,162,39,0.3)" fill="none" stroke-width="2" />
          <circle cx="250" cy="250" r="180" stroke="rgba(201,162,39,0.2)" fill="none" stroke-width="1"
            stroke-dasharray="8 12" />
          <polygon points="250,70 375,360 100,170 400,170 125,360" stroke="rgba(201,162,39,0.25)" fill="none"
            stroke-width="1" />
        </svg>
      </div>
      <h2 class="loading-overlay__title" data-i18n="loading.title">
        Invocando Criaturas...
      </h2>
      <div class="loading-overlay__bar">
        <div class="loading-overlay__fill" id="loadingFill"></div>
      </div>
      <p class="loading-overlay__text" id="loadingText" data-i18n="loading.text">
        Contatando o reino dos monstros...
      </p>
    </div>
  </div>

  <!-- Screen Effect Overlays -->
  <div class="screen-overlay" id="overlayTableA"></div>
  <div class="screen-overlay" id="overlayTableB"></div>
  <div class="screen-overlay" id="overlayTableC"></div>
  <div class="screen-overlay" id="overlayTierB"></div>
  <div class="screen-overlay" id="overlayTierA"></div>
  <div class="screen-overlay" id="overlayTierAB"></div>
  <div class="screen-overlay" id="overlayTierS"></div>
  <div class="screen-overlay" id="overlayCritical"></div>
  <!-- Fog / Mist Layer -->
  <div class="fog-layer" aria-hidden="true">
    <div class="fog-layer__wisp"></div>
    <div class="fog-layer__wisp"></div>
    <div class="fog-layer__wisp"></div>
  </div>

  <!-- Summoning Circle -->
  <div class="summoning-circle" id="summoningCircle" aria-hidden="true">
    <svg class="summoning-circle__svg" viewBox="0 0 500 500">
      <!-- Outer rings -->
      <circle class="summoning-circle__ring" cx="250" cy="250" r="240" />
      <circle class="summoning-circle__ring" cx="250" cy="250" r="220" stroke-dasharray="8 12" />
      <circle class="summoning-circle__ring" cx="250" cy="250" r="180" />
      <circle class="summoning-circle__ring" cx="250" cy="250" r="160" stroke-dasharray="4 8" />
      <!-- Inner pentagram -->
      <polygon class="summoning-circle__ring" points="250,70 375,360 100,170 400,170 125,360" stroke-dasharray="6 4" />
      <!-- Inner circle -->
      <circle class="summoning-circle__ring" cx="250" cy="250" r="100" />
      <!-- Rune texts around the circle -->
      <text class="summoning-circle__runes">
        <textPath href="#runePath" startOffset="0%">
          ☽ ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ ᛃ ᛈ ᛇ ᛉ ᛊ ᛏ ᛒ ᛖ ᛗ ᛚ ᛜ ᛞ ᛟ ☾ ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ
        </textPath>
      </text>
      <defs>
        <path id="runePath" d="M 250,250 m -200,0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" fill="none" />
      </defs>
    </svg>
  </div>

  <!-- Header -->
  <header class="header">
    <h1 class="header__title">
      <span class="header__title-icon">⚔️</span>PullCards
    </h1>
    <div class="header__coins" aria-live="polite">
      <span class="header__coins-icon">🔮</span>
      <span data-i18n="header.energy">Cargas:</span>
      <span class="header__coins-value" id="energyDisplay">? / 6</span>
    </div>
    <div class="header__coins" aria-live="polite" id="bonusContainer" style="
          display: none;
          margin-left: 10px;
          color: var(--gold);
          border-color: rgba(201, 162, 39, 0.4);
          background: rgba(201, 162, 39, 0.05);
        ">
      <span class="header__coins-icon">🎁</span>
      <span data-i18n="header.bonus">Bônus:</span>
      <span class="header__coins-value" id="bonusDisplay">0</span>
    </div>
    <div class="header__coins" aria-live="polite" id="timerContainer" style="display: none; margin-left: 10px">
      <span class="header__coins-icon">⌛</span>
      <span class="header__coins-value" id="timerDisplay">00:00:00</span>
    </div>

    <div class="header__nav" style="display: flex; gap: 10px; align-items: center">
      <a href="/collection.html" data-i18n="header.bestiary" style="
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 4px 10px;
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 4px;
            transition: all 0.2s;
          " onmouseover="
            this.style.color = 'var(--gold)';
            this.style.borderColor = 'var(--gold)';
          " onmouseout="
            this.style.color = 'var(--text-secondary)';
            this.style.borderColor = 'rgba(201,162,39,0.15)';
          ">📖 Bestiário</a>
      <span id="headerUserInfo" style="font-size: 0.8rem; color: var(--text-secondary)"></span>
      <div class="header__lang">
        <select id="langSelect" class="lang-select">
          <option value="pt-BR">🇧🇷 PT-BR</option>
          <option value="en">🇺🇸 EN</option>
        </select>
      </div>
    </div>
  </header>

  <!-- Main Stage -->
  <main class="stage" id="stage">
    <!-- Controls Zone (top area) -->
    <div class="stage__controls">
      <!-- Narration (always visible at top) -->
      <div class="narration" id="narration"></div>

      <!-- Step Indicator -->
      <div class="step-indicator" id="stepIndicator">
        <div class="step-indicator__dot" id="stepDot1"></div>
        <div class="step-indicator__line" id="stepLine1"></div>
        <div class="step-indicator__dot" id="stepDot2"></div>
        <div class="step-indicator__line" id="stepLine2"></div>
        <div class="step-indicator__dot" id="stepDot3"></div>
      </div>

      <!-- Ritual Buttons -->
      <button class="ritual-btn ritual-btn--begin visible" id="btnBegin" type="button">
        <span data-i18n="buttons.begin">Iniciar Invocação</span>
        <span class="ritual-btn__sub" data-i18n="buttons.beginSub">🔮 Consome 1 carga de energia</span>
      </button>

      <button class="ritual-btn ritual-btn--d100" id="btnRollD100" type="button">
        <span data-i18n="buttons.rollD100">🎲 Lançar os Ossos</span>
        <span class="ritual-btn__sub" data-i18n="buttons.rollD100Sub">d100 — Determine qual reino responde</span>
      </button>

      <button class="ritual-btn ritual-btn--d20" id="btnRollD20" type="button">
        <span data-i18n="buttons.rollD20">🎲 Rolar Qualidade</span>
        <span class="ritual-btn__sub" data-i18n="buttons.rollD20Sub">d20 — Que nível de poder atende seu chamado?</span>
      </button>

      <!-- Dice Arena -->
      <div class="dice-arena" id="diceArena">
        <div class="dice-group" id="diceGroupD100">
          <span class="dice-group__label">d100</span>
          <div class="dice dice--d100" id="diceD100">
            <div class="dice__face">?</div>
          </div>
          <span class="dice__result" id="resultD100"></span>
        </div>
        <div class="dice-group" id="diceGroupD20">
          <span class="dice-group__label">d20</span>
          <div class="dice dice--d20" id="diceD20">
            <div class="dice__face">?</div>
          </div>
          <span class="dice__result" id="resultD20"></span>
        </div>
      </div>

      <!-- Result Banner -->
      <div class="result-banner" id="resultBanner">
        <div class="result-banner__critical" id="resultCritical"></div>
      </div>
    </div>

    <!-- Card Reveal Area (centered independently) -->
    <div class="multi-card-area" id="cardArea"></div>
  </main>

  <!-- Collection Tray -->
  <section class="collection" id="collectionSection">
    <h2 class="collection__title" data-i18n="collection.title">
      🗃️ Sua Coleção
    </h2>
    <div class="collection__grid" id="collectionGrid">
      <span class="collection__empty" data-i18n="collection.empty">O círculo de invocação aguarda sua primeira
        oferenda...</span>
    </div>
  </section>

  <!-- Scripts -->
  <script src="api.js"></script>
  <script src="player-session.js"></script>
  <script src="sounds.js"></script>
  <script>
    // ============================================================
    // PullCards – Medieval Fantasy Ritual Controller
    // ============================================================
    (async () => {
      // --- Auth Guard ---
      if (!AuthManager.requireAuth()) return;

      // --- Load Database from D&D 5e API ---
      const loadingOverlay = document.getElementById("loadingOverlay");
      const loadingFill = document.getElementById("loadingFill");
      const loadingText = document.getElementById("loadingText");

      let cardsDB = [];
      let gameConfig = {};
      try {
        // Initialize i18n
        await I18n.init();

        // Load Admin Config
        try {
          gameConfig = await ApiClient.get("/api/config");
        } catch (e) {
          console.warn("Could not load config", e);
        }

        cardsDB = await MonsterAPI.loadAll((done, total) => {
          const pct = Math.round((done / total) * 100);
          loadingFill.style.width = pct + "%";
          loadingText.textContent = `${done} / ${total}`;
        });
        loadingText.textContent = `${cardsDB.length} ✅`;
      } catch (e) {
        console.error("Failed to load monsters", e);
        loadingText.textContent = "❌";
      }

      // Hide loading overlay
      await new Promise((r) => setTimeout(r, 600));
      loadingOverlay.classList.add("hidden");
      loadingOverlay.addEventListener(
        "transitionend",
        () => loadingOverlay.remove(),
        { once: true },
      );

      // --- DOM ---
      const $ = (id) => document.getElementById(id);
      const energyDisplay = $("energyDisplay");
      const timerContainer = $("timerContainer");
      const timerDisplay = $("timerDisplay");
      const stage = $("stage");
      const btnBegin = $("btnBegin");
      const btnRollD100 = $("btnRollD100");
      const btnRollD20 = $("btnRollD20");
      const narration = $("narration");
      const diceArena = $("diceArena");
      const diceGroupD100 = $("diceGroupD100");
      const diceGroupD20 = $("diceGroupD20");
      const diceD100 = $("diceD100");
      const diceD20 = $("diceD20");
      const resultD100 = $("resultD100");
      const resultD20 = $("resultD20");
      const resultCritical = $("resultCritical");
      const cardArea = $("cardArea");
      const collectionGrid = $("collectionGrid");
      const stepIndicator = $("stepIndicator");
      const stepDots = [$("stepDot1"), $("stepDot2"), $("stepDot3")];
      const stepLines = [$("stepLine1"), $("stepLine2")];
      const summoningCircle = $("summoningCircle");

      const overlays = {
        tableA: $("overlayTableA"),
        tableB: $("overlayTableB"),
        tableC: $("overlayTableC"),
        tierB: $("overlayTierB"),
        tierA: $("overlayTierA"),
        tierAB: $("overlayTierAB"),
        tierS: $("overlayTierS"),
        critical: $("overlayCritical"),
      };
      // --- State ---
      let currentExpansionId = "dnd5e"; // Temporary mock unitl Wave 6 adds the world selector
      let state = PlayerSession.createGameState(currentExpansionId);
      let countdownInterval = null;
      const tierNames = {}; // Populated dynamically
      const getTierNickname = (tierId) => {
        const custom = gameConfig.customTiers?.[tierId];
        return custom ? custom.nickname : tierNames[tierId] || tierId;
      };
      let currentTable = null;
      let ritualHum = null;

      // --- UI Updaters ---
      const formatTime = (ms) => {
        if (ms <= 0) return "00:00:00";
        const h = Math.floor(ms / (1000 * 60 * 60));
        const m = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((ms % (1000 * 60)) / 1000);
        return `${h.toString().padStart(2, "0")}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
      };

      const syncEnergyState = async () => {
        const user = AuthManager.getUser();
        if (!user) return; // Guard already handles redirect

        try {
          const data = await ApiClient.get(
            `/api/collection/${user.id}/status?expansionId=${currentExpansionId}`,
          );
          state.energy.available = data.availableSummons;
          state.energy.max = data.maxSummons;
          state.energy.nextSummonAt = data.nextSummonAt;
          state.energy.bonus = data.bonusCharges || 0;
          updateEnergyUI();
        } catch (e) {
          console.error("Failed to sync energy", e);
        }
      };

      const updateEnergyUI = () => {
        energyDisplay.textContent = `${state.energy.available} / ${state.energy.max}`;

        const bonusContainer = $("bonusContainer");
        const bonusDisplay = $("bonusDisplay");
        if (state.energy.bonus > 0) {
          bonusContainer.style.display = "flex";
          bonusDisplay.textContent = state.energy.bonus;
        } else {
          bonusContainer.style.display = "none";
        }

        // Handle Timer
        if (countdownInterval) clearInterval(countdownInterval);

        if (
          state.energy.available < state.energy.max &&
          state.energy.nextSummonAt
        ) {
          timerContainer.style.display = "flex";

          countdownInterval = setInterval(() => {
            const now = Date.now();
            const next = new Date(state.energy.nextSummonAt).getTime();
            const diff = next - now;

            if (diff <= 0) {
              clearInterval(countdownInterval);
              timerDisplay.textContent = "00:00:00";
              syncEnergyState(); // Fetch new charge!
            } else {
              timerDisplay.textContent = formatTime(diff);
            }
          }, 1000);
        } else {
          timerContainer.style.display = "none";
        }

        if (!PlayerSession.canSummon(state)) {
          btnBegin.classList.add("disabled");
          btnBegin.style.opacity = "0.5";
          btnBegin.style.pointerEvents = "none";
          btnBegin.querySelector(".ritual-btn__sub").textContent =
            "Sem cargas sagradas. Aguarde...";
        } else {
          btnBegin.classList.remove("disabled");
          btnBegin.style.opacity = "1";
          btnBegin.style.pointerEvents = "auto";
          const costText =
            state.energy.bonus > 0
              ? "🎁 Consome 1 Carga Bônus"
              : "🔮 Consome 1 carga comum";
          btnBegin.querySelector(".ritual-btn__sub").textContent = costText;
        }
      };

      const shakeEnergy = () => {
        energyDisplay.parentElement.classList.add("shake");
        setTimeout(
          () => energyDisplay.parentElement.classList.remove("shake"),
          400,
        );
      };

      // Initial Sync
      syncEnergyState();

      // --- Studio i18n Sync ---
      const applyCustomSummonExperience = () => {
        const cfg = gameConfig?.summonExperience;
        if (!cfg) return;

        const lang = I18n.getLang() || "pt-BR";

        const mapText = (propertyKey) => {
          if (cfg[propertyKey] && cfg[propertyKey][lang]) return cfg[propertyKey][lang];
          if (cfg[propertyKey] && cfg[propertyKey]["pt-BR"]) return cfg[propertyKey]["pt-BR"];
          return null;
        };

        const sBtn100 = mapText("btnD100");
        if (sBtn100) btnRollD100.querySelector("span:first-child").textContent = sBtn100;

        const sSub100 = mapText("subD100");
        if (sSub100) btnRollD100.querySelector(".ritual-btn__sub").textContent = sSub100;

        const sBtn20 = mapText("btnD20");
        if (sBtn20) btnRollD20.querySelector("span:first-child").textContent = sBtn20;

        const sSub20 = mapText("subD20");
        if (sSub20) btnRollD20.querySelector(".ritual-btn__sub").textContent = sSub20;
      };

      window.addEventListener("langchange", applyCustomSummonExperience);
      applyCustomSummonExperience(); // Call once on load

      // --- Config-based text resolver with i18n fallback ---
      const resolveConfigText = (configObj, i18nKey, replacements) => {
        const lang = I18n.getLang() || "pt-BR";
        const configText = configObj?.[lang] || configObj?.["pt-BR"];
        if (configText) return configText;
        return I18n.t(i18nKey, replacements);
      };

      // --- Helpers ---
      const wait = (ms) => new Promise((r) => setTimeout(r, ms));

      // --- Typewriter Narration WITH sound ---
      const typeNarration = (text, speed = 35) => {
        return new Promise((resolve) => {
          narration.textContent = "";
          narration.classList.add("visible");
          let i = 0;
          const interval = setInterval(() => {
            narration.textContent += text[i];
            if (i % 2 === 0) SoundEngine.typewriterTick();
            i++;
            if (i >= text.length) {
              clearInterval(interval);
              resolve();
            }
          }, speed);
        });
      };

      const clearNarration = () => {
        narration.textContent = "";
        narration.classList.remove(
          "visible",
          "parchment",
          "dramatic",
          "tier-b-text",
          "tier-a-text",
          "tier-s-text",
        );
      };

      // --- Screen Effects ---
      const fireOverlay = (key, cssClass) => {
        const el = overlays[key];
        if (!el) { console.warn("Overlay missing:", key); return; }
        el.className = `screen-overlay screen-overlay--${cssClass} active`;
        el.addEventListener(
          "animationend",
          () => {
            el.className = "screen-overlay";
          },
          { once: true },
        );
      };

      const shakeScreen = (heavy = false) => {
        stage.classList.add(heavy ? "screen-shake--heavy" : "screen-shake");
        setTimeout(
          () => stage.classList.remove("screen-shake", "screen-shake--heavy"),
          heavy ? 700 : 500,
        );
      };

      // --- Particles ---
      const spawnParticles = (count = 30, colors = null) => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const palette = colors || [
          "#ffd700",
          "#ffaa00",
          "#ff6600",
          "#ffffff",
          "#c9a227",
        ];
        for (let i = 0; i < count; i++) {
          const el = document.createElement("div");
          el.className = "particle";
          const angle =
            (Math.PI * 2 * i) / count + (Math.random() * 0.5 - 0.25);
          const dist = 120 + Math.random() * 280;
          el.style.left = cx + "px";
          el.style.top = cy + "px";
          el.style.background =
            palette[Math.floor(Math.random() * palette.length)];
          el.style.setProperty("--px", Math.cos(angle) * dist + "px");
          el.style.setProperty("--py", Math.sin(angle) * dist + "px");
          const size = 3 + Math.random() * 7;
          el.style.width = size + "px";
          el.style.height = size + "px";
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 1200);
        }
      };

      // --- Summoning Circle ---
      const activateCircle = (tableClass = null) => {
        summoningCircle.classList.add("active");
        summoningCircle.classList.remove("table-c");
        if (tableClass) summoningCircle.classList.add(tableClass);
      };

      const deactivateCircle = () => {
        summoningCircle.classList.remove("active", "table-c");
      };

      // --- Step Indicator ---
      const setStep = (n) => {
        stepIndicator.classList.add("visible");
        stepDots.forEach((d, i) => {
          d.classList.remove("active", "done");
          if (i < n - 1) d.classList.add("done");
          else if (i === n - 1) d.classList.add("active");
        });
        stepLines.forEach((l, i) => {
          l.classList.remove("done");
          if (i < n - 1) l.classList.add("done");
        });
      };

      const hideSteps = () => {
        stepIndicator.classList.remove("visible");
        stepDots.forEach((d) => d.classList.remove("active", "done"));
        stepLines.forEach((l) => l.classList.remove("done"));
      };

      // --- Buttons ---
      const showBtn = (b) => b.classList.add("visible");
      const hideBtn = (b) => b.classList.remove("visible");

      // --- Card Builder (Original Game Card Design) ---
      const createCardElement = (card, tier) => {
        const w = document.createElement("div");
        w.className = `card card--tier-${tier}`;
        const imgSrc = card.image || card.imageUrl || "";
        const typeName = card.type || "???";
        const crLabel = card.cr ?? "?";
        const hp = card.hp ?? "?";
        const ac = card.armorClass ?? card.ac ?? "?";
        const s = card.stats || {};
        const statCells = ["str", "dex", "con", "int", "wis", "cha"]
          .map((k) => {
            const st = s[k] || { score: 10, modifier: "+0" };
            return `<div class="stat-cell">
            <span class="stat-label">${k.toUpperCase()}</span>
            <span class="stat-value">${st.score}</span>
            <span class="stat-mod">${st.modifier}</span>
          </div>`;
          })
          .join("");

        w.innerHTML = `
          <div class="card__face card__back">
            <div class="card__back-pattern">
              <span class="card__back-symbol">🂠</span>
            </div>
          </div>
          <div class="card__face card__front">
            <div class="char-card-inner">
              <div class="combat-card-header">
                <div class="card-hp-badge">${hp}</div>
                <div class="card-name-block">
                  <span class="card-name">${card.name}</span>
                  <span class="card-subtitle">${typeName}</span>
                </div>
                <div class="cr-badge"><span class="cr-value">${crLabel}</span></div>
              </div>
              <div class="char-image-wrapper">
                <img src="${imgSrc}" class="char-image-fallback" alt="${card.name}" loading="lazy">
                <div class="ca-badge">
                  <span class="ca-label">CA</span>
                  <span class="ca-value">${ac}</span>
                </div>
              </div>
              <div class="rune-border"></div>
              <div class="stats-row">${statCells}</div>
            </div>
          </div>
        `;
        return w;
      };

      const addToCollection = (card, tier) => {
        const empty = collectionGrid.querySelector(".collection__empty");
        if (empty) empty.remove();
        const m = document.createElement("div");
        m.className = `collection__mini-card collection__mini-card--tier-${tier}`;
        const imgSrc = card.image || card.imageUrl || "";
        m.title = `${card.name} (${card.type}) — HP:${card.hp} CA:${card.armorClass ?? card.ac} CR:${card.cr}`;
        m.innerHTML = `
          <img src="${imgSrc}" alt="${card.name}" loading="lazy">
          <span class="collection__mini-card-name">${card.name}</span>
        `;
        collectionGrid.appendChild(m);
      };

      // --- Reset ---
      const resetStage = () => {
        diceD100.querySelector(".dice__face").textContent = "?";
        diceD20.querySelector(".dice__face").textContent = "?";
        resultD100.textContent = "";
        resultD20.textContent = "";
        resultCritical.classList.remove("visible");
        resultCritical.textContent = "";
        // Clear cards and auras
        cardArea.innerHTML = "";
        clearNarration();
        diceArena.classList.remove("active");
        diceGroupD100.classList.remove("visible");
        diceGroupD20.classList.remove("visible");
        hideBtn(btnRollD100);
        hideBtn(btnRollD20);
        hideSteps();
        deactivateCircle();
        currentTable = null;
        if (ritualHum) {
          ritualHum.stop();
          ritualHum = null;
        }
        stage.classList.remove("stage--showcase");
      };

      let resolvedRollData = null;

      // ============================================================
      // PHASE 1: Begin Summoning
      // ============================================================
      btnBegin.addEventListener("click", async () => {
        if (!AuthManager.getUser()) {
          alert(I18n.t("auth.loginRequired"));
          return;
        }
        if (!PlayerSession.canSummon(state)) return;

        resetStage();
        hideBtn(btnBegin);

        shakeEnergy();
        SoundEngine.coinPay(); // Keep the sound or change to an arcane hum later

        // Activate circle + ambient hum
        activateCircle();
        ritualHum = SoundEngine.startRitualHum();

        setStep(1);

        narration.className = "narration parchment";

        const cfg = MonsterAPI.getConfig();
        let introText = I18n.t("narration.circleAwakens");
        if (cfg?.summonExperience?.introText) {
          const lang = I18n.getLang() || "pt-BR";
          introText = cfg.summonExperience.introText[lang] || cfg.summonExperience.introText["pt-BR"] || introText;
        }

        await typeNarration(introText, 38);
        await wait(800);

        showBtn(btnRollD100);
      });

      // ============================================================
      // PHASE 2: Roll d100 (Table)
      // ============================================================
      btnRollD100.addEventListener("click", async () => {
        hideBtn(btnRollD100);

        // --- BACKEND API CALL ---
        // Execute the entire roll on the backend now to lock in the destiny
        const { success, result, reason } =
          await PlayerSession.performSummon(state);

        if (!success) {
          alert(reason || "A invocação falhou.");
          resetStage();
          showBtn(btnBegin);
          syncEnergyState();
          return;
        }

        resolvedRollData = result; // Save for phase 3!
        syncEnergyState(); // Update UI energy now that backend deducted it

        diceArena.classList.add("active");
        diceGroupD100.classList.add("visible");
        diceD100.classList.add("rolling");
        SoundEngine.diceRoll();

        const flash = setInterval(() => {
          diceD100.querySelector(".dice__face").textContent =
            Math.floor(Math.random() * 100) + 1;
        }, 80);

        await wait(2000);
        clearInterval(flash);

        const tableResult = resolvedRollData;
        currentTable = tableResult.table;

        diceD100.classList.remove("rolling");
        diceD100.querySelector(".dice__face").textContent = tableResult.d100;
        resultD100.textContent = I18n.t("dice.table", {
          table: tableResult.table,
        });
        SoundEngine.diceLand();

        await wait(400);
        setStep(2);

        // --- Table Dramatization ---
        if (tableResult.table === "A") {
          fireOverlay("tableA", "table-a");
          SoundEngine.tableA();
          narration.className = "narration parchment";
          await typeNarration(I18n.t("narration.tableA"), 40);
        } else if (tableResult.table === "B") {
          fireOverlay("tableB", "table-b");
          shakeScreen(false);
          SoundEngine.tableB();
          narration.className = "narration parchment";
          await typeNarration(I18n.t("narration.tableB"), 42);
        } else {
          activateCircle("table-c");
          fireOverlay("tableC", "table-c");
          shakeScreen(true);
          SoundEngine.tableC();
          spawnParticles(25, [
            "#9b59b6",
            "#c39bd3",
            "#bb8fce",
            "#ffffff",
            "#d2b4de",
          ]);
          narration.className = "narration parchment dramatic";
          await typeNarration(I18n.t("narration.tableC"), 38);
        }

        await wait(1200);
        showBtn(btnRollD20);
      });

      // ============================================================
      // PHASE 3: Roll d20 (Tier)
      // ============================================================
      btnRollD20.addEventListener("click", async () => {
        hideBtn(btnRollD20);

        diceGroupD20.classList.add("visible");
        diceD20.classList.add("rolling");
        SoundEngine.diceRoll();

        const flash = setInterval(() => {
          diceD20.querySelector(".dice__face").textContent =
            Math.floor(Math.random() * 20) + 1;
        }, 80);

        await wait(2000);
        clearInterval(flash);

        const tierResult = resolvedRollData;
        diceD20.classList.remove("rolling");
        diceD20.querySelector(".dice__face").textContent = tierResult.d20;
        SoundEngine.diceLand();

        await wait(400);
        setStep(3);

        // --- Tier Dramatization ---
        const cfg = MonsterAPI.getConfig();
        const customTiers = cfg?.customTiers || {};
        const tierData = customTiers[tierResult.tier];

        if (tierResult.isCritical) {
          fireOverlay("critical", "critical");
          shakeScreen(true);
          SoundEngine.tierS();

          const se = gameConfig?.summonExperience || {};

          if (tierResult.criticalData.type === "Z") {
            resultCritical.textContent = I18n.t("narration.criticalZ");
            spawnParticles(100, ["#ffffff", "#fff68f", "#ffeaa7", "#ff33ff"]);
            narration.className = "narration parchment tier-z-text dramatic";
            await typeNarration(I18n.t("narration.tierZ"), 42);
          } else if (tierResult.criticalData.type === "S") {
            resultCritical.textContent = I18n.t("narration.criticalSBanner");
            spawnParticles(80, ["#ffd700", "#fff68f", "#ffeaa7", "#ffffff"]);
            narration.className = "narration parchment tier-s-text";
            await typeNarration(
              resolveConfigText(se.critSingle, "narration.criticalS"),
              42,
            );
          } else {
            resultCritical.textContent = I18n.t("narration.criticalMulti", {
              count: tierResult.criticalData.count,
            });
            spawnParticles(60, ["#ffd700", "#ffaa00", "#fff68f", "#ffffff"]);
            narration.className = "narration parchment tier-s-text";
            await typeNarration(
              resolveConfigText(se.critMulti, "narration.criticalMultiNarration"),
              40,
            );
          }
          resultD20.textContent = I18n.t("results.critical");
          resultCritical.classList.add("visible");
        } else if (tierData) {
          // Dynamic Tier — interpolated visual effects (0–100 scale)
          const colors = tierData.colors || ["#ffd700", "#ffffff"];
          const vi = tierData.visualIntensity ?? tierData.rateTarget ?? 50;
          const particles = Math.round(3 + (vi / 100) * 57); // 3 → 60

          if (vi > 75) {
            fireOverlay("tierS", "tier-s");
            shakeScreen(true);
            SoundEngine.tierS();
            spawnParticles(particles, [colors[0], colors[1], "#ffffff"]);
          } else if (vi > 35) {
            fireOverlay("tierAB", "tier-ab");
            shakeScreen(false);
            SoundEngine.tierA();
            spawnParticles(particles, [colors[0], colors[1]]);
          } else if (vi > 0) {
            SoundEngine.tierC();
            spawnParticles(particles, [colors[0], colors[1]]);
          }

          resultD20.textContent = getTierNickname(tierResult.tier);
          narration.className = `narration parchment tier-${tierResult.tier.toLowerCase()}-text`;
          await typeNarration(
            resolveConfigText(
              tierData.narration,
              `narration.tier${tierResult.tier}`,
            ) || `"Uma invocação de classe ${tierData.label} surge do portal!"`,
            40,
          );
        } else {
          // Safe fallback for old hardcoded logic not mapped in Studio
          SoundEngine.tierC();
          resultD20.textContent = getTierNickname(tierResult.tier);
          narration.className = "narration parchment";
          await typeNarration(
            I18n.t(`narration.tier${tierResult.tier}`) ||
            '"A criatura responde ao chamado."',
            40,
          );
        }

        await wait(1200);

        // Stop ritual hum before card reveal
        if (ritualHum) {
          ritualHum.stop();
          ritualHum = null;
        }

        // Hide dice area for card focus
        diceArena.classList.remove("active");
        hideSteps();

        // ============================================================
        // PHASE 4: Card Reveal (card stays on screen!)
        // ============================================================
        const revealParticles = {
          E: { count: 4, colors: ["#424242", "#616161"] },
          D: { count: 6, colors: ["#8d6e63", "#a1887f"] },
          C: { count: 8, colors: ["#8a8a8a", "#aaaaaa", "#cccccc"] },
          B: {
            count: 20,
            colors: ["#2ecc71", "#27ae60", "#58d68d", "#ffffff"],
          },
          A: {
            count: 35,
            colors: ["#4a9eff", "#85c1e9", "#aed6f1", "#d4e6f1", "#ffffff"],
          },
          S: {
            count: 60,
            colors: ["#ffd700", "#ffaa00", "#fff68f", "#ffeaa7", "#ffffff"],
          },
          Z: {
            count: 100,
            colors: ["#ffffff", "#ff33ff", "#fff68f", "#ffeaa7"],
          },
        };

        for (const card of tierResult.cards) {
          const cardEl = createCardElement(card, tierResult.tier);
          cardArea.appendChild(cardEl);

          // Create tier-specific aura behind card
          const aura = document.createElement("div");
          aura.className = `card-aura card-aura--${tierResult.tier}`;
          cardArea.appendChild(aura);

          void cardEl.offsetWidth;
          cardEl.classList.add("visible");
          await wait(600);

          // Flip card
          SoundEngine.cardFlip();
          cardEl.classList.add("flipped");
          await wait(800);

          // Tier-specific reveal burst
          const fx = revealParticles[tierResult.tier] || revealParticles.C;
          spawnParticles(fx.count, fx.colors);
          SoundEngine.cardReveal(tierResult.tier);

          // Activate aura
          aura.classList.add("visible");

          // Enter showcase mode (card scales up + floats)
          await wait(300);
          cardEl.classList.add("showcase");

          // Tier S: extra screen flash
          if (tierResult.tier === "S") {
            fireOverlay("critical", "critical");
            shakeScreen(true);
            spawnParticles(40, ["#ffd700", "#ffffff", "#ffee88"]);
          }

          addToCollection(card, tierResult.tier);
          state.collection.push(card);

          // Persist to server if logged in
          const currentUser = AuthManager.getUser();
          if (currentUser) {
            ApiClient.post(`/api/collection/${currentUser.id}/add`, {
              cardId: card.id,
              tier: tierResult.tier,
            }).catch((err) => console.error("Failed to persist card:", err));
          }
        }

        await wait(400);

        // Show narration for the summoned creature
        const creatureName = tierResult.cards[0]?.name || "a creature";
        narration.className = "narration parchment";
        await typeNarration(
          I18n.t("narration.boundToCollection", { name: creatureName }),
          35,
        );

        // Cleanup dice but KEEP card on screen — show Begin Summoning
        deactivateCircle();
        resultCritical.classList.remove("visible");
        stage.classList.add("stage--showcase");
        showBtn(btnBegin);
        // Ensure UI is accurate using local state if fetch somehow failed, or just a redraw
        updateEnergyUI();
      });

      // --- Init ---
      updateEnergyUI();

      // --- Auth Header ---
      const headerUserInfo = document.getElementById("headerUserInfo");
      const currentUser = AuthManager.getUser();
      let adminLink = "";
      if (currentUser.isAdmin) {
        adminLink = `<a href="/admin.html" style="color:var(--text-secondary); text-decoration:none; font-size:0.8rem; margin-right: 8px;">⚙️ Admin</a>`;
      }
      headerUserInfo.innerHTML = `${adminLink}<a href="/profile.html" style="color:var(--text-secondary); text-decoration:none; font-size:0.8rem;">🧙 ${currentUser.name}</a> <a href="#" onclick="AuthManager.logout(); return false;" style="color:var(--text-muted); font-size:0.7rem; margin-left:6px; text-decoration:underline;">sair</a>`;

      // --- Language Selector ---
      const langSelect = document.getElementById("langSelect");
      langSelect.value = I18n.getLang();
      langSelect.addEventListener("change", async (e) => {
        await I18n.setLang(e.target.value);
        // Reload monsters for new locale
        cardsDB = await MonsterAPI.loadAll();
        console.log(
          `🌐 Reloaded ${cardsDB.length} monsters for ${e.target.value}`,
        );
      });
    })();
  </script>
</body>

</html>
