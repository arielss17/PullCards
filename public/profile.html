<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PullCards — Configure seu perfil de invocador.">
    <title>PullCards — Perfil do Invocador</title>
    <link rel="stylesheet" href="auth.css">
    <style>
        .profile-info {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(201, 162, 39, 0.15);
        }

        .profile-info__email {
            font-size: 0.8rem;
            color: #888;
            font-family: monospace;
        }

        .profile-info__date {
            font-size: 0.7rem;
            color: #666;
            margin-top: 4px;
        }

        .auth-nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .auth-nav a {
            color: rgba(201, 162, 39, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 14px;
            border: 1px solid rgba(201, 162, 39, 0.15);
            border-radius: 4px;
            transition: all 0.2s;
        }

        .auth-nav a:hover {
            color: #c9a227;
            border-color: #c9a227;
        }
    </style>
</head>

<body>
    <div class="header__lang" style="position: fixed; top: 15px; right: 20px; z-index: 100;">
        <select id="langSelect" class="lang-select">
            <option value="pt-BR">🇧🇷 PT-BR</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>
    <div class="auth-container">
        <div class="auth-logo">
            <span class="auth-logo__icon">🧙</span>
            <h1 class="auth-logo__title" data-i18n="profile.title">Perfil do Invocador</h1>
            <p class="auth-logo__subtitle" data-i18n="profile.subtitle">Altere seu nome ou senha</p>
        </div>

        <div class="auth-card">
            <!-- User Info -->
            <div class="profile-info">
                <div class="profile-info__email" id="profileEmail">-</div>
                <div class="profile-info__date" id="profileDate">-</div>
            </div>

            <!-- Message -->
            <div class="auth-message" id="profileMessage"></div>

            <!-- Edit Form -->
            <form class="auth-form active" id="formProfile">
                <div class="auth-field">
                    <label class="auth-field__label" for="profileName" data-i18n="profile.nameLabel">Nome do
                        Invocador</label>
                    <input class="auth-field__input" id="profileName" type="text"
                        data-i18n-placeholder="auth.namePlaceholder" placeholder="Seu nome" autocomplete="name">
                </div>
                <div class="auth-field">
                    <label class="auth-field__label" for="currentPassword"
                        data-i18n="profile.currentPasswordLabel">Senha Atual (obrigatória)</label>
                    <input class="auth-field__input" id="currentPassword" type="password"
                        data-i18n-placeholder="auth.passwordPlaceholder" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <div class="auth-field">
                    <label class="auth-field__label" for="newPassword" data-i18n="profile.newPasswordLabel">Nova Senha
                        (deixe vazio para manter)</label>
                    <input class="auth-field__input" id="newPassword" type="password"
                        data-i18n-placeholder="auth.passwordPlaceholder" placeholder="••••••••"
                        autocomplete="new-password">
                </div>
                <button class="auth-submit" type="submit" data-i18n="profile.submitBtn">Selar Alterações</button>
            </form>

            <div class="auth-nav">
                <a href="/" data-i18n="profile.backToGame">⚔️ Voltar ao Jogo</a>
                <a href="/collection.html" data-i18n="profile.bestiary">📖 Bestiário</a>
            </div>
        </div>
    </div>

    <script src="api-client.js"></script>
    <script src="i18n.js"></script>
    <script src="auth.js"></script>
    <script>
        (async () => {
            const lang = await I18n.init();
            const langSelect = document.getElementById('langSelect');
            if (langSelect) {
                langSelect.value = lang;
                langSelect.addEventListener('change', async (e) => {
                    await I18n.setLang(e.target.value);
                });
            }

            // --- Auth Guard ---
            if (!AuthManager.requireAuth()) return;

            const user = AuthManager.getUser();
            if (!user) return;

            // Populate fields
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profileDate').textContent = I18n.t('profile.memberSince', { date: new Date(user.createdAt).toLocaleDateString(I18n.getLang()) });
            document.getElementById('profileName').value = user.name || '';

            const form = document.getElementById('formProfile');
            const msg = document.getElementById('profileMessage');

            const showMessage = (text, type = 'error') => {
                msg.textContent = text;
                msg.className = `auth-message visible auth-message--${type}`;
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = form.querySelector('.auth-submit');
                btn.disabled = true;
                btn.textContent = I18n.t('profile.submitting');

                const currentPassword = document.getElementById('currentPassword').value;
                const newName = document.getElementById('profileName').value;
                const newPassword = document.getElementById('newPassword').value;

                try {
                    const res = await fetch('/api/auth/update', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: user.id,
                            currentPassword,
                            newName: newName || undefined,
                            newPassword: newPassword || undefined,
                        }),
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        showMessage(data.error || I18n.t('errors.updateFailed'), 'error');
                        btn.disabled = false;
                        btn.textContent = I18n.t('profile.submitBtn');
                        return;
                    }

                    // Update local storage with new user data
                    AuthManager.setUser(data.user);
                    showMessage(I18n.t('profile.success'), 'success');
                    btn.textContent = I18n.t('profile.submitted');

                    // Clear password fields
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';

                    setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = I18n.t('profile.submitBtn');
                    }, 2000);
                } catch (err) {
                    console.error('Profile update error:', err);
                    showMessage(I18n.t('profile.connectionError'), 'error');
                    btn.disabled = false;
                    btn.textContent = I18n.t('profile.submitBtn');
                }
            });
        })();
    </script>
</body>

</html>
